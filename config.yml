scanner:
  quoteAsset: "USDT"
  blacklist:
    - "UP"
    - "DOWN"
    - "BULL"
    - "BEAR"
    - "3L"
    - "3S"
  # Leave empty to track all filtered pairs
  watchlist: []

pump:
  enabled: false
  pumpThreshold: 3.0
  dumpThreshold: -3.0
  cooldownMinutes: 30
  pollIntervalSeconds: 30
  report:
    enabled: false
    schedule: "5 * * * *"
    topN: 5

volume:
  enabled: true
  schedule: "1 * * * *"  # every hour at :01
  interval: "1h"
  lookbackCandles: 24
  spikeMultiplier: 3.0

signals:
  enabled: true
  interval: "15m"
  pollIntervalSeconds: 300   # scan every 5 minutes
  cooldownMinutes: 120       # same coin won't alert again for 2 hours
  minScore: 80               # minimum score out of 100 to trigger alert
