scanner:
  quoteAsset: "USDT"
  # Substring match — only patterns that don't produce false positives
  blacklist:
    # Leveraged / inverse tokens
    - "UP"
    - "DOWN"
    - "BULL"
    - "BEAR"
    # Stablecoins (safe substring patterns)
    - "USDC"
    - "USDP"
    - "DAI"
    - "FDUSD"
    - "USDE"
    - "FRAX"
    - "AEUR"
    - "EURI"
    - "USD1"
    # Wrapped tokens
    - "WBTC"
    - "BETH"

  # Exact match — full symbol names to exclude
  exact_blacklist:
    - "XUSDUSDT"
    - "BUSDUSDT"
    - "TUSDUSDT"
    - "SUSDUSDT"
    - "FDUSDUSDT"
    - "USDSUSDT"
    - "USTUSDT"
    - "USTCUSDT"
    - "USDCUSDT"
    - "RLUSDUSDT"
  # Leave empty to track all filtered pairs
  watchlist: []

pump:
  enabled: false
  pumpThreshold: 3.0
  dumpThreshold: -3.0
  cooldownMinutes: 30
  pollIntervalSeconds: 30
  report:
    enabled: false
    schedule: "5 * * * *"
    topN: 5

volume:
  enabled: true
  schedule: "1 * * * *"  # every hour at :01
  interval: "1h"
  lookbackCandles: 24
  spikeMultiplier: 3.0

signals:
  enabled: true
  interval: "15m"
  pollIntervalSeconds: 300   # scan every 5 minutes
  cooldownMinutes: 120       # same coin won't alert again for 2 hours
  minScore: 80               # minimum score out of 100 to trigger alert
